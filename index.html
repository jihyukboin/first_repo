<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFY - I AM</title>
    <style>
        /* 기본 리셋 및 공통 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff; /* 흰색 배경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333333;
            overflow-x: hidden;
        }

        /* ----------------------------------------
           공통 헤더 영역 (글래스모피즘)
        ---------------------------------------- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
        }

        .header-left {
            flex: 1;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        .header-center {
            flex: 1;
            text-align: center;
        }

        .header-center a {
            text-decoration: none;
            color: #333333;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s ease;
        }

        .header-center a:hover {
            color: #000000;
        }

        .header-right {
            flex: 1;
        }

        /* ----------------------------------------
           메인 영역 및 히어로 섹션
        ---------------------------------------- */
        main {
            width: 100%;
        }

        #hero-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top : 100px;
            align-items: center;
            position: relative;
        }

        /* 썸네일 이미지 (7:4 비율 플레이스홀더) */
        .thumbnail-placeholder {
            width: 90%;
            max-width: 700px;
            aspect-ratio: 7 / 4;
            background-color: #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        /* 타이틀 텍스트 */
        .hero-title {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        /* 중앙 하단 더보기 버튼 (Apple CTA Blue) */
        #more-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #007AFF; /* Apple 시스템 블루 */
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.3);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        #more-btn:hover {
            background-color: #0062cc;
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
            transform: translateX(-50%) translateY(3px);
        }

        /* 쉐브론 아이콘 (흰색) */
        .chevron-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #FFFFFF; /* 흰색 획 적용 */
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* 스크롤 도착 지점이 될 메인 섹션 */
        #empty-section {
            display: block;
            width: 100%;
            min-height: 100vh;
            padding-top: 50px; /* 헤더가 가리지 않도록 상단 패딩 추가 */
        }

    </style>
</head>
<body>

    <header>
        <div class="header-left">SSAFY - I AM</div>
        <nav class="header-center">
            <a href="#about">소개</a>
        </nav>
        <div class="header-right"></div>
    </header>

    <main>
        <section id="hero-section">
            <div class="thumbnail-placeholder"></div>
            <h1 class="hero-title">I AM 프로젝트</h1>

            <button id="more-btn" aria-label="다음 섹션으로 이동">
                <svg class="chevron-icon" viewBox="0 0 24 24">
                    <path d="M6 9l6 6 6-6"></path>
                </svg>
            </button>
        </section>

        <section id="empty-section">
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const moreBtn = document.getElementById('more-btn');
            const emptySection = document.getElementById('empty-section');

            // 더보기 버튼 클릭 시 부드러운 스크롤 이벤트
            moreBtn.addEventListener('click', () => {
                emptySection.scrollIntoView({ 
                    behavior: 'smooth',
                    block: 'start'
                });
            });
        });
    </script>
</body>
</html>
