<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="정지혁의 연락처입니다.">
    <title>SSAFY - I AM | 연락처</title>

    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css">

    <style>
        :root {
            --background: #ffffff;
            --surface: rgba(255, 255, 255, 0.86);
            --text: #191f28;
            --text-secondary: #4e5968;
            --text-muted: #8b95a1;
            --line: rgba(25, 31, 40, 0.10);
            --accent: #3182f6;
            --accent-hover: #1b64da;
            --header-height: 58px;
            --content-width: 700px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        body {
            min-height: 100svh;
            background: linear-gradient(135deg, #f7f9fc 0%, #ffffff 45%, #edf3fa 100%);
            color: var(--text);
            font-family: "Pretendard GOV", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            height: var(--header-height);
            padding: 0 28px;
            border-bottom: 1px solid rgba(25, 31, 40, 0.06);
            background: var(--surface);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
        }

        .header-left { font-size: 18px; font-weight: 750; letter-spacing: -0.04em; }

        .header-center { display: flex; justify-content: center; gap: 18px; }

        .header-center a {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 650;
            letter-spacing: -0.02em;
            text-decoration: none;
            transition: color 180ms ease;
        }

        .header-center a:hover,
        .header-center a:focus-visible,
        .header-center a[aria-current="page"] { color: var(--text); }

        .header-right { min-width: 1px; }

        main {
            display: grid;
            min-height: 100svh;
            place-items: center;
            padding: calc(var(--header-height) + 72px) 20px 72px;
        }

        .contact-card {
            width: min(100%, var(--content-width));
            padding: clamp(34px, 7vw, 64px);
            border: 1px solid rgba(25, 31, 40, 0.08);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 24px 70px rgba(25, 31, 40, 0.08);
        }

        .eyebrow { color: var(--accent); font-size: 14px; font-weight: 720; letter-spacing: 0.02em; }

        h1 {
            margin-top: 12px;
            font-size: clamp(30px, 5vw, 42px);
            letter-spacing: -0.055em;
            line-height: 1.28;
        }

        .description { margin-top: 16px; color: var(--text-secondary); font-size: 17px; line-height: 1.7; letter-spacing: -0.025em; }

        .contact-table {
            width: 100%;
            margin-top: 38px;
            border-collapse: collapse;
            border: 1px solid rgba(78, 89, 104, 0.30);
        }

        .contact-table th,
        .contact-table td { padding: 22px 24px; border-bottom: 1px solid rgba(78, 89, 104, 0.30); text-align: left; }

        .contact-table th { width: 30%; border-right: 1px solid rgba(78, 89, 104, 0.30); color: var(--text-muted); font-size: 15px; font-weight: 650; }
        .contact-table td { color: var(--text); font-size: 17px; font-weight: 560; letter-spacing: -0.02em; }
        .contact-table a { color: inherit; text-underline-offset: 4px; }
        .contact-table a:hover { color: var(--accent-hover); }

        .email-cell { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }

        .copy-button {
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 650;
            cursor: pointer;
        }

        .copy-button:hover,
        .copy-button:focus-visible { border-color: var(--accent); color: var(--accent); }

        .contact-table tbody tr:last-child th,
        .contact-table tbody tr:last-child td { border-bottom: 0; }

        @media (max-width: 640px) {
            :root { --header-height: 54px; }
            header { padding: 0 18px; }
            .header-left { font-size: 16px; }
            .header-center a { font-size: 13px; }
            .contact-table th { width: 34%; }
            .contact-table td { font-size: 15px; overflow-wrap: anywhere; }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-left">SSAFY - I AM</div>

        <nav class="header-center" aria-label="주요 메뉴">
            <a href="./index.html#about">소개</a>
            <a href="./contact.html" aria-current="page">연락처</a>
        </nav>

        <div class="header-right"></div>
    </header>

    <main>
        <section class="contact-card" aria-labelledby="contact-title">
            <p class="eyebrow">CONTACT</p>
            <h1 id="contact-title">함께 이야기해요.</h1>
            <p class="description">프로젝트나 협업에 관한 연락을 편하게 남겨 주세요.</p>

            <table class="contact-table">
                <caption class="sr-only">정지혁 연락처</caption>
                <tbody>
                    <tr>
                        <th scope="row">이름</th>
                        <td>정지혁</td>
                    </tr>
                    <tr>
                        <th scope="row">이메일</th>
                        <td class="email-cell">
                            <a href="mailto:jihyukboin@naver.com">jihyukboin@naver.com</a>
                            <button class="copy-button" type="button" data-copy="jihyukboin@naver.com">복사</button>
                        </td>
                    </tr>
                    <tr>
                        <th scope="row">전화번호</th>
                        <td><a href="tel:01040518305">010 4051 8305</a></td>
                    </tr>
                    <tr>
                        <th scope="row">GitHub</th>
                        <td><a href="https://github.com/jihyukboin" target="_blank" rel="noopener noreferrer">github.com/jihyukboin</a></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        document.querySelector(".copy-button").addEventListener("click", async (event) => {
            const button = event.currentTarget;
            const email = button.dataset.copy;

            try {
                await navigator.clipboard.writeText(email);
                button.textContent = "복사됨";
            } catch {
                button.textContent = "복사 실패";
            }

            window.setTimeout(() => { button.textContent = "복사"; }, 1600);
        });
    </script>
</body>

</html>
